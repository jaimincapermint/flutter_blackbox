name: flutter_blackbox
description: In-app debug & QA overlay for Flutter. Network inspector, mock engine, live logs, FPS monitor, feature flags, and automated QA reports. Dio & http adapters.
version: 0.2.0
homepage: https://github.com/jaimincapermint/flutter_blackbox
repository: https://github.com/jaimincapermint/flutter_blackbox

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"


dependencies:
  flutter:
    sdk: flutter

  # ── Optional HTTP client adapters ─────────────────────────────────────────
  dio: ^5.4.0
  http: ^1.0.0
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.0
  socket_io_client: ^3.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

topics:
  - debug
  - developer-tools
  - overlay
  - network
  - logging
