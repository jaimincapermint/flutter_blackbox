name: flutter_blackbox
description: All-in-one in-app debug overlay for Flutter. Network inspector, API mocking, live logs, FPS monitor, rebuild tracker, storage inspector, crash reports, and QA tools.
version: 0.5.0
homepage: https://github.com/jaimincapermint/flutter_blackbox
repository: https://github.com/jaimincapermint/flutter_blackbox
issue_tracker: https://github.com/jaimincapermint/flutter_blackbox/issues
funding:
  - https://github.com/sponsors/jaimincapermint

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"


dependencies:
  flutter:
    sdk: flutter
  yaml: ^3.1.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  # ── Optional adapter packages — used only for testing CLI templates ───
  dio: ^5.4.0
  http: ^1.0.0
  shared_preferences: ^2.5.0
  socket_io_client: ^3.0.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

topics:
  - debug
  - developer-tools
  - inspector
  - network
  - logging

executables:
  init: init
